META_ARC: "pentiptrack"

BACKBONE:
    TYPE: "mobilenetv3_small"
    KWARGS:
        used_layers: [4]

ADJUST:
    ADJUST: True
    TYPE: AdjustLayer
    KWARGS:
        in_channels: 64
        out_channels: 64

BAN:
    BAN: True
    TYPE: DepthwiseBAN
    KWARGS:
        in_channels: 64
        out_channels: 64

CUDA: True

POINT:
    STRIDE: 16

TRACK:
    TYPE: PenTipTracker
    WINDOW_INFLUENCE: 0.490
    PENALTY_K: 0.99
    LR: 0.01
    EXEMPLAR_SIZE: 127
    INSTANCE_SIZE: 255
    BASE_SIZE: 7
    CONTEXT_AMOUNT: 0.5
    OUTPUT_SIZE: 16
